<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>lost &amp; found — Thapar University</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="description" content="The campus board for things that go missing — and get found. Thapar University.">

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #f59e0b;
      --accent-dim: rgba(245,158,11,0.15);
      --accent-border: rgba(245,158,11,0.35);
      --bg: #0f0e0d;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f5f4f0;
      --muted: rgba(245,244,240,0.45);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0d0c0b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(245,158,11,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(134,239,172,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      z-index: 1;
    }

    @media (min-width: 480px) {
      .login-card {
        min-height: auto;
        border-radius: 28px;
        border: 1px solid var(--border);
        box-shadow: 0 32px 80px rgba(0,0,0,0.5);
        overflow: hidden;
      }
    }

    .top-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 28px 0;
    }

    .app-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(245,158,11,0.1));
      border: 1.5px solid rgba(245,158,11,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 40px rgba(245,158,11,0.2);
    }

    .wordmark {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 38px;
      color: var(--text);
      line-height: 1.1;
      text-align: center;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .campus-pill {
      padding: 4px 14px;
      border-radius: 99px;
      margin-top: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .bottom-section {
      padding: 32px 28px 44px;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 11px;
      color: var(--muted);
    }

    #loginBtn {
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: rgba(255,255,255,0.95);
      color: #1a1a1a;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }
    #loginBtn:hover { background: #fff; box-shadow: 0 6px 28px rgba(255,255,255,0.18); transform: translateY(-1px); }
    #loginBtn:active { transform: translateY(0); }
    #loginBtn.loading {
      background: rgba(255,255,255,0.08);
      cursor: default;
      box-shadow: none;
      transform: none;
      color: var(--muted);
    }

    .spinner {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(245,244,240,0.3);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.65;
    }
    .auth-note .highlight { color: var(--accent); }

    #msg {
      text-align: center;
      font-size: 12px;
      color: #f87171;
      margin-top: 12px;
      min-height: 18px;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .footer a:hover { opacity: 1; }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="top-section">
      <div class="app-icon">🔍</div>

      <h1 class="wordmark">lost &amp; found</h1>

      <p class="tagline">
        The campus board for things that<br>go missing — and get found.
      </p>

      <div class="campus-pill">Thapar University</div>
    </div>

    <div class="bottom-section">
      <div class="divider">
        <div class="divider-line"></div>
        <span>sign in to continue</span>
        <div class="divider-line"></div>
      </div>

      <button id="loginBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.4H42V20H24v8h11.3C33.7 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8.1 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.6z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.2 19 12 24 12c3.1 0 5.9 1.2 8.1 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2 1.5-4.6 2.5-7.3 2.5-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.7 39.7 16.3 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.4H42V20H24v8h11.3c-1.1 3-3.3 5.4-6.3 6.8l6.3 5.3C38.9 36.9 44 31.2 44 24c0-1.3-.1-2.6-.4-3.6z"/>
        </svg>
        Continue with Google
      </button>

      <p id="msg"></p>

      <p class="auth-note">
        Only <span class="highlight">@thapar.edu</span> accounts are permitted
      </p>

      <div class="footer">
        <span>Made by <strong style="color:var(--text)">Avnish Raj</strong></span>
        <a href="https://www.instagram.com/avniiisssshhhhh" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0C5.8 0 5.5.01 4.7.04c-.8.03-1.4.17-1.9.36a3.9 3.9 0 0 0-1.4.9A3.9 3.9 0 0 0 .6 2.7c-.2.5-.33 1.1-.36 1.9C.21 5.5.2 5.8.2 8s.01 2.5.04 3.3c.03.8.17 1.4.36 1.9.23.6.55 1 .9 1.4.4.35.8.67 1.4.9.5.2 1.1.33 1.9.36.8.03 1.1.04 3.3.04s2.5-.01 3.3-.04c.8-.03 1.4-.17 1.9-.36a3.9 3.9 0 0 0 1.4-.9c.35-.4.67-.8.9-1.4.2-.5.33-1.1.36-1.9.03-.8.04-1.1.04-3.3s-.01-2.5-.04-3.3c-.03-.8-.17-1.4-.36-1.9a3.9 3.9 0 0 0-.9-1.4 3.9 3.9 0 0 0-1.4-.9c-.5-.2-1.1-.33-1.9-.36C10.5.01 10.2 0 8 0zM8 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm4.5-.9a.9.9 0 1 1-1.8 0 .9.9 0 0 1 1.8 0z"/>
          </svg>
          Instagram
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    // Loading state for login button
    const btn = document.getElementById('loginBtn');
    btn.addEventListener('click', () => {
      btn.classList.add('loading');
      btn.innerHTML = '<div class="spinner"></div><span>Signing in\u2026</span>';
      btn.disabled = true;
    });
  </script>
</body>
</html>
