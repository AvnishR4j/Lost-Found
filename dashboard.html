<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>lost &amp; found — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #f59e0b;
      --accent-15: rgba(245,158,11,0.15);
      --accent-20: rgba(245,158,11,0.20);
      --accent-30: rgba(245,158,11,0.30);
      --accent-40: rgba(245,158,11,0.40);
      --bg: #0f0e0d;
      --bg2: #161412;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f5f4f0;
      --muted: rgba(245,244,240,0.45);
      --lost-bg: rgba(239,68,68,0.12);
      --lost-color: #f87171;
      --lost-border: rgba(239,68,68,0.25);
      --found-bg: rgba(134,239,172,0.12);
      --found-color: #86efac;
      --found-border: rgba(134,239,172,0.25);
    }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      margin: 0; padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0d0c0b;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
      position: fixed;
      width: 100%;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(245,158,11,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(134,239,172,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── App shell ────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 480px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      body { align-items: center; position: static; height: 100dvh; }
      .app {
        height: 92dvh;
        max-height: 860px;
        border-radius: 28px;
        border: 1px solid var(--border);
        box-shadow: 0 32px 80px rgba(0,0,0,0.6);
        overflow: hidden;
      }
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      padding: 16px 20px 0;
      flex-shrink: 0;
    }

    .header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }

    .wordmark-area .campus-label {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 2px;
    }
    .wordmark-area h1 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 22px; color: var(--text); line-height: 1;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* Avatar */
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-40), var(--accent-20));
      border: 1px solid var(--accent-40);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--accent);
      cursor: pointer;
    }

    /* ── Notification panel ────────────────────────────────── */
    #notifDropdown {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 76px 18px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    #notifDropdown.open { display: block; }

    .notif-header {
      padding: 12px 14px 8px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
    }

    #notifList { padding: 8px; }

    .notif-item {
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .notif-item:last-child { margin-bottom: 0; }
    .notif-item.unread {
      background: var(--accent-15);
      border: 1px solid var(--accent-30);
    }
    .notif-item.read { background: rgba(255,255,255,0.04); }
    .notif-item:hover { background: rgba(255,255,255,0.08); }

    .notif-item .icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .notif-item .content { flex: 1; min-width: 0; }
    .notif-item .title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
    .notif-item .msg { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .notif-item .score-badge {
      display: inline-block; margin-top: 8px;
      padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
      background: var(--accent-20); color: var(--accent);
      border: 1px solid var(--accent-40);
    }

    .notif-empty { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }

    /* ── Filter pills ──────────────────────────────────────── */
    .filter-row {
      display: flex; gap: 6px; align-items: center;
      margin-bottom: 12px;
      overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 6px 16px; border-radius: 99px; font-size: 12px; font-weight: 500;
      flex-shrink: 0; cursor: pointer; transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: capitalize;
    }
    .filter-btn.inactive {
      background: var(--card); color: var(--muted);
      border: 1px solid var(--border);
    }
    .filter-btn.active {
      background: var(--accent); color: #0f0e0d;
      border: 1px solid var(--accent);
      font-weight: 600;
    }
    .filter-spacer { flex: 1; }
    .item-count { font-size: 11px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }

    /* ── Feed ──────────────────────────────────────────────── */
    .feed {
      flex: 1; overflow-y: auto; padding: 0 20px 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(245,158,11,0.2) transparent;
    }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); border-radius: 3px; }

    /* Item cards */
    .item-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.35s cubic-bezier(0.34,1.26,0.64,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-card .match-badge {
      position: absolute; top: 12px; right: 12px;
      padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700;
      background: var(--accent-20); color: var(--accent);
      border: 1px solid var(--accent-40);
    }

    .item-card .card-header {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
    }

    .avatar-sm {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent-40), var(--accent-20));
      border: 1px solid var(--accent-40);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: var(--accent);
    }

    .card-meta { flex: 1; min-width: 0; }
    .card-meta .tag-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

    .type-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 99px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .type-tag.lost {
      background: var(--lost-bg); color: var(--lost-color);
      border: 1px solid var(--lost-border);
    }
    .type-tag.found {
      background: var(--found-bg); color: var(--found-color);
      border: 1px solid var(--found-border);
    }

    .card-time { font-size: 10px; color: var(--muted); }
    .card-title { font-weight: 600; font-size: 15px; color: var(--text); line-height: 1.3; }

    .card-body {
      font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 8px;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-location {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--muted);
    }

    .card-actions { display: flex; gap: 6px; }

    .btn-contact, .btn-resolve {
      padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn-contact {
      background: var(--accent-15); color: var(--accent);
      border: 1px solid var(--accent-30);
      text-decoration: none;
    }
    .btn-contact:hover { background: var(--accent-30); }
    .btn-resolve {
      background: rgba(239,68,68,0.08); color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-resolve:hover { background: rgba(239,68,68,0.16); }

    .items-empty {
      text-align: center; padding: 48px 20px;
      font-size: 13px; color: var(--muted); line-height: 1.8;
    }
    .items-empty .icon { font-size: 32px; display: block; margin-bottom: 12px; }

    /* ── Post FAB ─────────────────────────────────────────── */
    .fab-area {
      padding: 0 20px 28px;
      padding-bottom: max(28px, calc(16px + env(safe-area-inset-bottom)));
      flex-shrink: 0;
    }

    .fab-btn {
      width: 100%; padding: 15px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #0f0e0d; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 15px;
      box-shadow: 0 4px 24px rgba(245,158,11,0.4);
      transition: all 0.2s;
    }
    .fab-btn:hover {
      box-shadow: 0 6px 32px rgba(245,158,11,0.6);
      transform: translateY(-1px);
    }
    .fab-btn:active { transform: translateY(0); }

    /* ── Post Item Panel (full-screen) ───────────────────── */
    #postPanel {
      position: absolute; inset: 0;
      background: var(--bg);
      z-index: 50;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #postPanel.open {
      display: flex;
      animation: slidePanel 0.3s cubic-bezier(0.34,1.1,0.64,1);
    }
    @keyframes slidePanel {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .panel-header {
      padding: 72px 20px 0; flex-shrink: 0;
    }

    .panel-header-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 22px;
    }

    .btn-back {
      padding: 6px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer; color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700;
      transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.18); }

    .panel-title { font-size: 17px; font-weight: 600; color: var(--text); }

    /* Lost/found toggle */
    .type-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 4px;
      margin-bottom: 22px;
    }

    .toggle-btn {
      flex: 1; padding: 11px; border-radius: 9px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid transparent;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: capitalize; background: transparent;
    }
    .toggle-btn.lost-active {
      background: rgba(120,15,15,0.95); color: #ffaaaa;
      border-color: rgba(180,40,40,0.8);
    }
    .toggle-btn.found-active {
      background: rgba(134,239,172,0.12); color: #86efac;
      border-color: rgba(134,239,172,0.3);
    }
    .toggle-btn.inactive { color: var(--muted); }

    .panel-body {
      flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 20px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .panel-body::-webkit-scrollbar { display: none; }

    .field-group { margin-bottom: 14px; }
    .field-label {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.09em; text-transform: uppercase;
      display: block; margin-bottom: 8px; font-weight: 600;
    }

    /* Category pills */
    .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-pill {
      padding: 6px 12px; border-radius: 99px; font-size: 12px;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      border: 1px solid var(--border);
      background: var(--card); color: var(--muted);
    }
    .cat-pill.active {
      background: var(--accent-20); color: var(--accent);
      border-color: rgba(245,158,11,0.5);
    }

    .field-input, .field-textarea, .field-select {
      width: 100%; padding: 14px 16px; border-radius: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .field-input::placeholder, .field-textarea::placeholder { color: var(--muted); }
    .field-input:focus, .field-textarea:focus, .field-select:focus {
      border-color: rgba(245,158,11,0.6);
    }
    .field-textarea { resize: none; line-height: 1.5; }
    .field-select option { background: var(--bg2); }

    .panel-footer {
      padding: 12px 20px 50px;
      padding-bottom: max(50px, calc(24px + env(safe-area-inset-bottom)));
      flex-shrink: 0;
      min-height: 127.267px;
    }

    .btn-post {
      width: 100%; padding: 17px; border-radius: 99px;
      background: linear-gradient(90deg, #f5a623, #f7b733);
      color: #0f0e0d; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 15px;
      box-shadow: 0 4px 24px rgba(245,158,11,0.4);
      transition: all 0.2s;
    }
    .btn-post:hover { box-shadow: 0 6px 32px rgba(245,158,11,0.6); }

    #msg {
      font-size: 12px; color: #86efac;
      text-align: center; margin-top: 10px;
      min-height: 18px;
    }

    /* Post submitting state */
    .post-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 48px 32px;
    }
    .post-loading .step-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--accent-15); border: 2px solid var(--accent-40);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .post-loading .step-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .post-loading .step-sub { font-size: 12px; color: var(--muted); }
    .dots { display: flex; gap: 6px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 0.8s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Modals ────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    /* Resolve modal */
    #resolveModal {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #resolveModal.hidden { display: none; }
    #resolveModal:not(.hidden) { display: flex; }

    .resolve-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
      width: 100%; max-width: 320px;
    }
    .resolve-box h3 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .resolve-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .resolve-actions { display: flex; justify-content: flex-end; gap: 10px; }

    .btn-cancel {
      padding: 10px 18px; border-radius: 10px;
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-size: 14px;
      transition: all 0.2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.08); }

    #confirmResolveBtn {
      padding: 10px 20px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #0f0e0d; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
      transition: all 0.2s;
    }
    #confirmResolveBtn:hover { box-shadow: 0 4px 16px rgba(245,158,11,0.4); }

    /* Match modal */
    #matchModal {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #matchModal.hidden { display: none; }
    #matchModal:not(.hidden) { display: flex; }

    .match-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 400px;
      max-height: 88vh; overflow-y: auto;
    }

    .match-box-header {
      padding: 20px 20px 0;
    }

    .match-box-header h3 {
      font-size: 17px; font-weight: 600; color: var(--text);
      margin-bottom: 16px;
    }

    #matchContent { padding: 0 20px; }

    .match-score-hero {
      background: linear-gradient(135deg, var(--accent-15), rgba(245,158,11,0.05));
      border: 1px solid var(--accent-30);
      border-radius: 16px; padding: 20px;
      margin-bottom: 14px; text-align: center;
    }
    .match-score-hero .score-num {
      font-size: 48px; font-weight: 700; color: var(--accent);
      font-family: 'Instrument Serif', serif; line-height: 1;
    }
    .match-score-hero .score-label {
      font-size: 13px; color: var(--muted); margin-top: 4px;
    }
    .match-tags { display: flex; justify-content: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .match-tag {
      padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 600;
      background: var(--accent-15); color: var(--accent);
      border: 1px solid var(--accent-30);
    }

    .match-item-card {
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    }
    .match-item-card.lost-card {
      background: var(--card); border: 1px solid rgba(239,68,68,0.2);
    }
    .match-item-card.found-card {
      background: var(--card); border: 1px solid rgba(134,239,172,0.2);
    }
    .match-item-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .match-item-label.lost { color: var(--lost-color); }
    .match-item-label.found { color: var(--found-color); }
    .match-item-title { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 4px; }
    .match-item-desc { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .match-item-loc { font-size: 11px; color: var(--muted); }

    .match-arrow { text-align: center; font-size: 18px; margin: 6px 0; color: var(--muted); }

    .match-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 16px 20px 20px;
    }

    .btn-view-contact {
      padding: 12px 20px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #0f0e0d; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
      transition: all 0.2s;
    }
    .btn-view-contact:hover { box-shadow: 0 6px 24px rgba(245,158,11,0.6); }

    /* Logout link */
    .logout-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; color: var(--muted);
      padding: 6px 10px; border-radius: 8px;
      transition: all 0.2s;
    }
    .logout-btn:hover { color: #f87171; background: rgba(239,68,68,0.08); }
  </style>
</head>

<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────────── -->
    <div class="header">
      <div class="header-row">
        <div class="wordmark-area">
          <div class="campus-label">Thapar University</div>
          <h1>lost &amp; found</h1>
        </div>
        <div class="header-actions">
          <div class="user-avatar" id="userAvatar" title="Logout" onclick="logout()">?</div>
        </div>
        <!-- Hidden notification state (bell removed; JS still needs these elements) -->
        <div style="display:none">
          <div id="notifBadge"></div>
          <div id="notifDropdown"><div id="notifList"></div></div>
        </div>
      </div>

      <!-- Filter pills -->
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
        <button class="filter-btn inactive" data-filter="lost" onclick="setFilter(this)">Lost</button>
        <button class="filter-btn inactive" data-filter="found" onclick="setFilter(this)">Found</button>
        <div class="filter-spacer"></div>
        <div class="item-count" id="itemCount">— items</div>
      </div>
    </div>

    <!-- ── Feed ───────────────────────────────────────────── -->
    <div class="feed" id="items">
      <div class="items-empty">
        <span class="icon">🔍</span>
        Loading items…
      </div>
    </div>

    <!-- ── FAB ────────────────────────────────────────────── -->
    <div class="fab-area">
      <button class="fab-btn" onclick="openPostPanel()">+ Post an Item</button>
    </div>

    <!-- ── Post Item Panel (full-screen) ────────────────── -->
    <div id="postPanel">

      <!-- Form view -->
      <div id="postFormView">
        <div class="panel-header">
          <div class="panel-header-row">
            <button class="btn-back" onclick="closePostPanel()">All</button>
            <span class="panel-title">Report Item</span>
          </div>

          <!-- Lost / Found toggle -->
          <div class="type-toggle">
            <button class="toggle-btn lost-active" id="toggleLost" onclick="setType('lost')">✕ Lost</button>
            <button class="toggle-btn inactive" id="toggleFound" onclick="setType('found')">Found</button>
          </div>
        </div>

        <div class="panel-body">
          <!-- Category -->
          <div class="field-group">
            <label class="field-label">Category</label>
            <div class="cat-pills">
              <button class="cat-pill" onclick="setCategory(this)">ID Card</button>
              <button class="cat-pill" onclick="setCategory(this)">Wallet</button>
              <button class="cat-pill" onclick="setCategory(this)">Electronics</button>
              <button class="cat-pill" onclick="setCategory(this)">Books</button>
              <button class="cat-pill" onclick="setCategory(this)">Others</button>
            </div>
          </div>

          <!-- Hidden selects for dashboard.js compatibility -->
          <select id="type" style="display:none">
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
          <select id="category" style="display:none">
            <option>ID Card</option>
            <option>Wallet</option>
            <option>Electronics</option>
            <option>Books</option>
            <option>Others</option>
          </select>

          <div class="field-group">
            <label class="field-label" for="title">Item title</label>
            <input class="field-input" id="title" placeholder="e.g. Blue wallet, OnePlus earbuds" />
          </div>

          <div class="field-group">
            <label class="field-label" for="description">Description</label>
            <textarea class="field-textarea" id="description" style="height:84.6333px" placeholder="Any details that help identify it…"></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="location">Last seen / found at</label>
            <input class="field-input" id="location" placeholder="e.g. Block C Cafeteria" />
          </div>

          <div class="field-group">
            <label class="field-label" for="phone">Contact number</label>
            <input class="field-input" id="phone" placeholder="10-digit mobile number" maxlength="10" />
          </div>

          <div class="field-group" style="margin-bottom:24px">
            <label class="field-label">Photo (optional)</label>
            <input id="photo" type="file" accept="image/*" class="field-input" style="padding:8px 14px;cursor:pointer" onchange="previewPhoto(this)" />
            <input id="photoCamera" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)" />
            <button type="button" onclick="document.getElementById('photoCamera').click()" style="width:100%;margin-top:8px;padding:10px;border-radius:10px;background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.3);cursor:pointer;font-family:inherit;font-size:13px">📷 Take Photo with Camera</button>
            <img id="photoPreview" src="" alt="" style="display:none;margin-top:10px;max-height:180px;width:100%;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,0.1)" />
          </div>
        </div>

        <div class="panel-footer">
          <button class="btn-post" onclick="postItem()">+ Post an Item</button>
          <p id="msg"></p>
        </div>
      </div>

      <!-- Loading view (shown while posting) -->
      <div id="postLoadingView" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px">
        <div class="step-icon" id="postStepIcon">📤</div>
        <div style="text-align:center">
          <div class="step-title" id="postStepTitle">Posting your item…</div>
          <div class="step-sub" id="postStepSub">Please wait</div>
        </div>
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>

      <!-- Match/Success view (shown after posting) -->
      <div id="postMatchView" style="display:none; flex-direction:column; height:100%">
        <div class="panel-header">
          <div class="panel-header-row">
            <button class="btn-back" onclick="closePostPanel()">All</button>
            <span class="panel-title" id="matchViewTitle">🎯 Match Found!</span>
          </div>
        </div>
        <div style="flex:1; overflow-y:auto; padding:0 20px">
          <div id="matchViewContent"></div>
        </div>
        <div class="panel-footer">
          <button class="btn-post" onclick="closePostPanel()">Done →</button>
        </div>
      </div>

    </div><!-- /#postPanel -->

  </div><!-- /.app -->

  <!-- ── Resolve Modal ───────────────────────────────────── -->
  <div id="resolveModal" class="hidden">
    <div class="resolve-box">
      <h3>Mark as Resolved?</h3>
      <p>This will permanently remove the item from the board.</p>
      <div class="resolve-actions">
        <button class="btn-cancel" onclick="closeResolveModal()">Cancel</button>
        <button id="confirmResolveBtn">Resolved ✓</button>
      </div>
    </div>
  </div>

  <!-- ── Match Modal ──────────────────────────────────────── -->
  <div id="matchModal" class="hidden">
    <div class="match-box">
      <div class="match-box-header">
        <h3>Match Found</h3>
      </div>

      <div id="matchContent"></div>

      <div class="match-actions">
        <button class="btn-cancel" onclick="closeMatchModal()">Close</button>
        <button class="btn-view-contact" onclick="viewMatchedItem()">📞 View Contact</button>
      </div>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>

  <script>
    // ── UI helpers for new design ──────────────────────────

    let currentFilter = 'all';
    let allItemEls = []; // [{el, type}]

    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b === btn);
        b.classList.toggle('inactive', b !== btn);
      });
      currentFilter = btn.dataset.filter;
      filterItems();
    }

    function filterItems() {
      const feed = document.getElementById('items');
      const cards = feed.querySelectorAll('.item-card');
      let visible = 0;
      cards.forEach(card => {
        const t = card.dataset.type;
        const show = currentFilter === 'all' || t === currentFilter;
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('itemCount').textContent = visible + ' item' + (visible !== 1 ? 's' : '');
    }

    // Post panel
    function openPostPanel() {
      document.getElementById('postPanel').classList.add('open');
      document.getElementById('postFormView').style.display = '';
      document.getElementById('postLoadingView').style.display = 'none';
      document.getElementById('postMatchView').style.display = 'none';
      document.getElementById('msg').textContent = '';
    }
    function closePostPanel() {
      document.getElementById('postPanel').classList.remove('open');
      setTimeout(() => {
        document.getElementById('postFormView').style.display = '';
        document.getElementById('postLoadingView').style.display = 'none';
        document.getElementById('postMatchView').style.display = 'none';
        document.getElementById('msg').textContent = '';
      }, 300);
    }
    window.closePostPanel = closePostPanel;

    // Lost/found type toggle UI
    let _currentType = 'lost';
    function setType(t) {
      _currentType = t;
      const tl = document.getElementById('toggleLost');
      const tf = document.getElementById('toggleFound');
      tl.className = 'toggle-btn ' + (t === 'lost' ? 'lost-active' : 'inactive');
      tl.textContent = t === 'lost' ? '✕ Lost' : 'Lost';
      tf.className = 'toggle-btn ' + (t === 'found' ? 'found-active' : 'inactive');
      tf.textContent = t === 'found' ? '✓ Found' : 'Found';
      // sync hidden select
      document.getElementById('type').value = t;
    }
    window.setType = setType;

    // Category pill UI
    function setCategory(btn) {
      document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('category').value = btn.textContent;
    }
    window.setCategory = setCategory;

    // Override postItem to show 3-step loading then match/success view
    const _origPostItem = window.postItem;
    window.postItem = async function() {
      const form = document.getElementById('postFormView');
      const loading = document.getElementById('postLoadingView');
      form.style.display = 'none';
      loading.style.display = 'flex';

      const setStep = (icon, title, sub) => {
        document.getElementById('postStepIcon').textContent = icon;
        document.getElementById('postStepTitle').textContent = title;
        document.getElementById('postStepSub').textContent = sub;
      };

      setStep('📤', 'Posting your item…', 'Uploading to campus board');
      setTimeout(() => setStep('🔍', 'Searching for matches…', 'Scanning campus reports'), 900);
      setTimeout(() => setStep('🤖', 'Running AI analysis…', 'Checking keywords & location'), 1700);

      if (_origPostItem) {
        await _origPostItem();
      }

      // Show match/success view
      const msgText = document.getElementById('msg').textContent || '';
      const hasMatch = msgText.includes('match');
      loading.style.display = 'none';
      const matchView = document.getElementById('postMatchView');
      matchView.style.display = 'flex';
      document.getElementById('matchViewTitle').textContent = hasMatch ? '🎯 Match Found!' : '✅ Posted!';
      document.getElementById('matchViewContent').innerHTML = hasMatch
        ? `<div style="background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.35);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px">
            <div style="font-family:'Instrument Serif',serif;font-style:italic;font-size:52px;font-weight:700;color:#f59e0b;line-height:1">🎯</div>
            <div style="font-size:16px;font-weight:600;color:#f5f4f0;margin-top:12px">${msgText.replace('✅ ','')}</div>
            <div style="font-size:12px;color:rgba(245,244,240,0.45);margin-top:6px">Check your notifications for details</div>
          </div>`
        : `<div style="background:rgba(134,239,172,0.10);border:1px solid rgba(134,239,172,0.25);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px">
            <div style="font-size:52px;line-height:1">✅</div>
            <div style="font-size:16px;font-weight:600;color:#f5f4f0;margin-top:12px">${msgText.replace('✅ ','')}</div>
            <div style="font-size:12px;color:rgba(245,244,240,0.45);margin-top:6px">We'll notify you if we find a match</div>
          </div>`;
    };

    // Update item count after items load
    const origLoadItems = window.loadItems;

    // User avatar initials from auth
    function setUserInitials(name) {
      if (!name) return;
      const parts = name.trim().split(/\s+/);
      const initials = parts.length >= 2
        ? parts[0][0] + parts[parts.length-1][0]
        : parts[0].slice(0, 2);
      document.getElementById('userAvatar').textContent = initials.toUpperCase();
    }
    window.setUserInitials = setUserInitials;

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    function previewPhoto(input) {
      const preview = document.getElementById("photoPreview");
      if (input.files && input.files[0]) {
        const dt = new DataTransfer();
        dt.items.add(input.files[0]);
        document.getElementById("photo").files = dt.files;
        preview.src = URL.createObjectURL(input.files[0]);
        preview.style.display = "block";
      } else {
        preview.src = "";
        preview.style.display = "none";
      }
    }
  </script>
</body>
</html>
